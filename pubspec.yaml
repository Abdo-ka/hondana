name: hondana
description: A Flutter manga reader — Mihon port.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7

  # DI
  get_it: ^9.0.5
  injectable: ^2.6.0

  # Navigation
  auto_route: ^10.2.2

  # Localization
  easy_localization: ^3.0.8
  intl: ^0.20.2

  # Responsive / sizing
  flutter_screenutil: ^5.9.3

  # Networking + images
  dio: ^5.9.0
  cached_network_image: ^3.4.1
  html: ^0.15.5

  # Local database
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Filesystem
  path: ^1.9.0
  path_provider: ^2.1.5

  # Preferences
  shared_preferences: ^2.5.4

  collection: ^1.18.0
  meta: ^1.17.0
  native_dio_adapter: ^1.6.0
  cupertino_http: ^3.0.2
  cronet_http: ^1.9.0
  flutter_cache_manager: ^3.4.1
  background_downloader: ^9.5.5
  flutter_inappwebview: ^6.1.5
  scrollable_positioned_list: ^0.3.8
  http: ^1.6.0
  # Settings features: app lock (Face ID / Touch ID) and wifi-only library
  # updates.
  local_auth: ^2.3.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.10.3
  injectable_generator: ^2.9.1
  auto_route_generator: ^10.2.6
  drift_dev: ^2.21.0

  # App icon generation — see the `flutter_launcher_icons:` block below.
  flutter_launcher_icons: ^0.14.0

flutter:
  # Flutter 3.44 hardcodes the generated SwiftPM package to iOS 13, which
  # conflicts with background_downloader (needs iOS 14). Use CocoaPods instead;
  # the Podfile is already at platform :ios, '14.0'.
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/translations/

# App launcher icon — "Hondana" bookshelf. Source art in assets/icon/.
# Regenerate platform icons after changing the art:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
