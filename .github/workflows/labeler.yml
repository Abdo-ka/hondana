name: Labeler

# Auto-applies area/platform labels to PRs based on the files they touch,
# using the rules in .github/labeler.yml.
on: [pull_request_target]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true
