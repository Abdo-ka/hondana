name: PR Title

# Enforces that pull-request titles follow Conventional Commits. Because PRs are
# squash-merged, the PR title becomes the commit message on main.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional Commit types (kept in sync with CONTRIBUTING.md).
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter (imperative
            mood), e.g. "feat(reader): add double-tap zoom".
